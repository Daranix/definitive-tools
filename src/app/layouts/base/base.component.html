<div class="flex flex-col h-full max-h-full">

    <nav class="lg:hidden w-full p-4 border-b border-slate-200 bg-white z-50 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-3">
            <app-menu-icon [(toggleMenu)]="showMenu" />
            <a routerLink="/" class="flex items-center gap-1.5 font-bold text-slate-800">
                <lucide-icon name="bolt" class="w-5 h-5 text-indigo-600"></lucide-icon>
                <span>Definitive Tools</span>
            </a>
        </div>
        @if (topNavbarService.title()) {
            <div class="text-xs font-bold text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-full uppercase tracking-wider">
                {{ topNavbarService.title() }}
            </div>
        }
    </nav>
    

    <div class="flex grow overflow-hidden">
        
        <nav class="w-full lg:w-auto lg:flex-initial h-full max-h-full lg:max-h-none overflow-y-auto lg:block fixed lg:static transition-transform lg:translate-x-0 z-40 pb-14 lg:pb-0" [ngClass]="{ '-translate-x-full': !showMenu(), 'translate-x-0': showMenu()  }">
            <app-sidemenu />
        </nav>
        
        <main class="lg:flex-1 w-full overflow-y-auto">
            <router-outlet />
        </main>
    </div>
</div>
