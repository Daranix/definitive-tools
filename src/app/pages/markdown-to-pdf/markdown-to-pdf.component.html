<div class="flex flex-col h-screen bg-[#0f172a] text-slate-200">
  <main class="flex-1 flex overflow-hidden">
    <!-- Left Column: Editor -->
    <div class="flex-1 flex flex-col bg-[#1e293b] overflow-hidden border-r border-slate-700/50">
      <div class="px-4 py-2 bg-slate-800/50 border-b border-slate-700/50 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <lucide-icon name="code" class="w-4 h-4 text-indigo-400"></lucide-icon>
          <span class="text-sm font-medium text-slate-300">Editor</span>
        </div>
        <div class="flex items-center gap-2">
          <button (click)="handleClear()" 
                  class="p-1.5 hover:bg-slate-700 rounded-lg transition-colors text-slate-400 hover:text-slate-200"
                  title="Clear Editor">
            <lucide-icon name="trash-2" class="w-4 h-4"></lucide-icon>
          </button>
          <button (click)="handleCopy()" 
                  class="p-1.5 hover:bg-slate-700 rounded-lg transition-colors text-slate-400 hover:text-slate-200"
                  title="Copy Markdown">
            <lucide-icon name="copy" class="w-4 h-4"></lucide-icon>
          </button>
        </div>
      </div>
      <div class="flex-1 overflow-hidden">
        @if (isBrowser()) {
          <app-monaco-editor 
            class="h-full w-full"
            [code]="markdownText()"
            [options]="editorOptions()"
            (codeChange)="onContentChanges($event)">
          </app-monaco-editor>
        } @else {
          <div class="h-full w-full flex items-center justify-center bg-[#1e293b]">
            <div class="animate-pulse text-slate-500">Loading editor...</div>
          </div>
        }
      </div>
    </div>

    <!-- Right Column: Preview -->
    <div class="flex-1 flex flex-col bg-[#1e293b] overflow-hidden">
      <div class="px-4 py-2 bg-slate-800/50 border-b border-slate-700/50 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <lucide-icon name="book-open" class="w-4 h-4 text-indigo-400"></lucide-icon>
          <span class="text-sm font-medium text-slate-300">Preview</span>
        </div>
        <button (click)="downloadPdf()" 
                [disabled]="isGenerating() || !markdownText()"
                data-testid="md-pdf-generate-btn"
                class="flex items-center gap-2 px-3 py-1.5 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed text-white rounded-lg transition-all text-sm font-medium shadow-lg shadow-indigo-500/20">
          <lucide-icon [name]="isGenerating() ? 'rotate-cw' : 'file-text'" 
                       [class.animate-spin]="isGenerating()"
                       class="w-4 h-4"></lucide-icon>
          {{ isGenerating() ? 'Generating...' : 'Generate PDF' }}
        </button>
      </div>
      
      <!-- Preview Container -->
      <div class="flex-1 overflow-y-auto bg-white text-slate-900 p-8 markdown-body shadow-inner" id="preview-container">
        <div id="preview-content" data-testid="md-pdf-preview-content" [innerHTML]="previewHtml()"></div>
        <div *ngIf="!previewHtml()" data-testid="md-pdf-preview-empty" class="h-full flex flex-col items-center justify-center text-slate-400 py-20">
          <lucide-icon name="file-text" class="w-12 h-12 mb-4 opacity-20"></lucide-icon>
          <p class="text-lg font-medium opacity-50">Nothing to preview yet</p>
          <p class="text-sm opacity-40">Start typing in the editor to see the magic happen</p>
        </div>
      </div>
    </div>
  </main>
</div>
